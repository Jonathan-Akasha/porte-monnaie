<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1f1030"/>
      <stop offset="70%" stop-color="#0a0612"/>
      <stop offset="100%" stop-color="#050308"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8c075"/>
      <stop offset="50%" stop-color="#d4a857"/>
      <stop offset="100%" stop-color="#9a7a3e"/>
    </linearGradient>
    <linearGradient id="purse" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a3a2a"/>
      <stop offset="50%" stop-color="#3d2518"/>
      <stop offset="100%" stop-color="#241410"/>
    </linearGradient>
    <linearGradient id="purseShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a5a3a" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#6b3f25" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2a1610" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="112"/>

  <!-- Stars / cosmic dust -->
  <g fill="#d4a857" opacity="0.4">
    <circle cx="80" cy="90" r="1.5"/>
    <circle cx="420" cy="110" r="2"/>
    <circle cx="130" cy="150" r="1"/>
    <circle cx="380" cy="60" r="1.5"/>
    <circle cx="450" cy="200" r="1"/>
    <circle cx="60" cy="220" r="1.5"/>
    <circle cx="110" cy="420" r="1"/>
    <circle cx="440" cy="440" r="1.5"/>
    <circle cx="70" cy="380" r="1"/>
    <circle cx="460" cy="350" r="1"/>
  </g>

  <!-- Purse body -->
  <g transform="translate(256 280)">
    <!-- Main body with drawstring shape -->
    <path d="M -130 -20
             Q -150 40, -130 100
             Q -110 150, -60 165
             Q 0 175, 60 165
             Q 110 150, 130 100
             Q 150 40, 130 -20
             Q 110 -30, 60 -35
             L -60 -35
             Q -110 -30, -130 -20 Z"
          fill="url(#purse)"
          stroke="#d4a857"
          stroke-width="3"
          stroke-opacity="0.4"/>

    <!-- Shine overlay -->
    <path d="M -120 0
             Q -135 50, -115 90
             Q -100 110, -70 115"
          fill="none"
          stroke="url(#purseShine)"
          stroke-width="40"
          stroke-linecap="round"/>

    <!-- Drawstring opening -->
    <path d="M -100 -30
             Q -80 -50, -50 -55
             Q 0 -60, 50 -55
             Q 80 -50, 100 -30"
          fill="none"
          stroke="#8a6d3a"
          stroke-width="4"
          opacity="0.8"/>

    <!-- Drawstring gathers -->
    <g stroke="#6b5028" stroke-width="2" opacity="0.7" fill="none">
      <path d="M -80 -40 L -85 -20"/>
      <path d="M -40 -48 L -42 -22"/>
      <path d="M 0 -50 L 0 -22"/>
      <path d="M 40 -48 L 42 -22"/>
      <path d="M 80 -40 L 85 -20"/>
    </g>

    <!-- Drawstring cord -->
    <path d="M -100 -35 Q -70 -75, 0 -78 Q 70 -75, 100 -35"
          fill="none"
          stroke="#d4a857"
          stroke-width="3"
          opacity="0.75"/>

    <!-- Cord tails -->
    <path d="M -100 -35 Q -115 -25, -118 -10" fill="none" stroke="#d4a857" stroke-width="2.5"/>
    <path d="M 100 -35 Q 115 -25, 118 -10" fill="none" stroke="#d4a857" stroke-width="2.5"/>
    <circle cx="-119" cy="-8" r="4" fill="#d4a857"/>
    <circle cx="119" cy="-8" r="4" fill="#d4a857"/>

    <!-- Coin emerging from purse -->
    <g filter="url(#glow)">
      <circle cx="0" cy="30" r="42" fill="url(#gold)" stroke="#8a6d3a" stroke-width="2"/>
      <circle cx="0" cy="30" r="34" fill="none" stroke="#9a7a3e" stroke-width="1.5" opacity="0.6"/>
      <!-- Euro symbol on coin -->
      <text x="0" y="45" text-anchor="middle"
            font-family="Georgia, serif"
            font-size="48"
            font-weight="500"
            font-style="italic"
            fill="#4a3818">€</text>
    </g>
  </g>

  <!-- Subtle top ornament -->
  <g transform="translate(256 100)" opacity="0.5">
    <circle cx="0" cy="0" r="3" fill="#d4a857"/>
    <circle cx="-25" cy="0" r="1.5" fill="#d4a857"/>
    <circle cx="25" cy="0" r="1.5" fill="#d4a857"/>
  </g>
</svg>
